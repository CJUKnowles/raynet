# Two-minute run, a single isolated flow sending data to a server.

[General]
ned-path = !HOME!/raynet/_topologies:!HOME!/inet4.5/examples:!HOME!/inet4.5/showcases:!HOME!/inet4.5/src:!HOME!/inet4.5/tests/validation:!HOME!/inet4.5/tests/networks:!HOME!/inet4.5/tutorials:!HOME!/omnetpp/samples/tcpPaced/src:!HOME!/omnetpp/samples/tcpGoodputApplications/src:!HOME!/omnetpp/samples/cubic/src:!HOME!/raynet/simlibs/RLComponents/src:!HOME!/raynet/simlibs/Orca/src:!HOME!/raynet/simlibs/Astraea/src:!HOME!/raynet/simlibs/CleanSlate/src:
# General
sim-time-limit = 60s

# Outputs/verbosity
check-signals = false
record-eventlog= false
cmdenv-express-mode = true
cmdenv-redirect-output = false
cmdenv-log-prefix = %t | %m |
cmdenv-silent = true
cmdenv-event-banners = false
**.cmdenv-log-level = off
**.queue.recordStats = true

# Metrics (for plotting!)
**.intervalDuration:vector(removeRepeats).vector-recording = true # You need this, plus it needs to be registered as a removeRepeats signal in the NED
**.srtt:vector(removeRepeats).vector-recording = true 
**.throughput:vector(removeRepeats).vector-recording = true 
**.pacerate:vector(removeRepeats).vector-recording = true 
**.action:vector(removeRepeats).vector-recording = true 
**.cwnd:vector(removeRepeats).vector-recording = true 
**.broker.simThroughputProbeInterval = 1s
**.broker.simsecPerSec:vector(removeRepeats).vector-recording = true
**.**.tcp.conn-*.**.vector-recording = true # Need this too, for some reason
**.scalar-recording=false
**.vector-recording=true
**.bin-recording=false

# Network parameters
network = topologies.Dumbbell
**.numberOfFlows = 1                                                    # Number of client/server pairs. Includes the "main" protocol being tested, client[0]
**.router1.ppp[0].queue.dataCapacity = !QSIZE!     # Bottleneck buffer size
**.bottleneckDatarate = BANDWIDTH_PLACEHOLDER                              # Bottleneck bandwidth
**.bottleneckDelay = DELAY_PLACEHOLDER                                      # Base RTT


# Client settings
**.client[*].numApps = 1
**.client[*].app[*].typename  = "TcpGoodputSessionApp"
**.client[*].app[*].active = true
**.client[*].app[*].connectAddress = "server["+string(parentIndex())+"]"
**.client[0].app[*].tOpen  = START_TIME_PLACEHOLDERs
**.client[0].app[*].tSend = START_TIME_PLACEHOLDERs
**.client[*].app[*].tOpen  = .1s
**.client[*].app[*].tSend = .1s
**.client[*].app[*].sendBytes = 2GB

# Server settings
**.server[*].numApps = 1
**.server[*].app[*].typename = "TcpSinkApp"
**.server[*].app[*].serverThreadModuleType = "tcpgoodputapplications.applications.tcpapp.TcpGoodputSinkAppThread"

# Router/queue settings
**.router1.ppp[0].queue.typename = "DropTailQueue"                                  # Number of client/server pairs. Includes the "main" protocol being tested, client[0]

# Misc. TCP Settings
**.tcp.advertisedWindow = 200000000
**.tcp.windowScalingSupport = true
**.tcp.windowScalingFactor = -1
**.tcp.increasedIWEnabled = true
**.tcp.delayedAcksEnabled = false
**.tcp.timestampSupport = true
**.tcp.ecnWillingness = false
**.tcp.nagleEnabled = true
**.tcp.stopOperationTimeout = 4000s
**.tcp.mss = 1448
**.tcp.sackSupport = true

# All agents use the same protocol
**.client[0].tcp.typename = "!PROTOCOL!Tcp"
**.client[0].tcp.tcpAlgorithmClass = "!PROTOCOL!"
**.server[0].tcp.typename = "TcpPaced"
**.server[*].tcp.tcpAlgorithmClass = "TcpCubic"
