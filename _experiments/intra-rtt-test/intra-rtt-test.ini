# Two-minute run, a single isolated flow sending data to a server.

[General]
load-libs = HOME/omnetpp/samples/tcpPaced/src/tcpPaced
ned-path = HOME/raynet/_topologies:HOME/inet4.5/examples:HOME/inet4.5/showcases:HOME/inet4.5/src:HOME/inet4.5/tests/validation:HOME/inet4.5/tests/networks:HOME/inet4.5/tutorials:HOME/omnetpp/samples/tcpPaced/src:HOME/omnetpp/samples/tcpGoodputApplications/src:HOME/omnetpp/samples/cubic/src:HOME/raynet/simlibs/RLComponents/src:HOME/raynet/simlibs/Orca/src:HOME/raynet/simlibs/Astraea/src:HOME/raynet/simlibs/CleanSlate/src:HOME/omnetpp/samples/orbtcpExperiments/src
ecord-eventlog=false
cmdenv-express-mode = true
cmdenv-redirect-output = false
cmdenv-output-file = dctcpLog.txt
**.client*.tcp.conn-8.cmdenv-log-level = detail
cmdenv-log-prefix = %t | %m |


cmdenv-event-banners = false
**.cmdenv-log-level = off

# **.**.tcp.conn-*.cwnd:vector(removeRepeats).vector-recording = true
# **.**.tcp.conn-*.rtt:vector(removeRepeats).vector-recording = true
# **.**.tcp.conn-*.srtt:vector(removeRepeats).vector-recording = true
# **.**.tcp.conn-*.throughput:vector(removeRepeats).vector-recording = true
# **.**.tcp.conn-*.**.result-recording-modes = vector(removeRepeats)
# **.**.queue.queueLength:vector(removeRepeats).vector-recording = true
# **.**.queue.queueLength.result-recording-modes = vector(removeRepeats)
# **.**.goodput:vector(removeRepeats).vector-recording = true
# **.**.goodput.result-recording-modes = vector(removeRepeats)
# **.**.bandwidth:vector(removeRepeats).vector-recording = true
# **.**.bandwidth.result-recording-modes = vector(removeRepeats)
# **.**.mbytesInFlight:vector(removeRepeats).vector-recording = true
# **.**.mbytesInFlight.result-recording-modes = vector(removeRepeats)
**.scalar-recording=false
**.vector-recording=false
**.bin-recording=false

**.goodputInterval = 10s
**.throughputInterval = 10s
# Client uses Astraea

**.tcp.advertisedWindow = 200000000
**.tcp.windowScalingSupport = true
**.tcp.windowScalingFactor = -1
**.tcp.increasedIWEnabled = true
**.tcp.delayedAcksEnabled = false
**.tcp.timestampSupport = true
**.tcp.ecnWillingness = false
**.tcp.nagleEnabled = true
**.tcp.stopOperationTimeout = 4000s
**.tcp.mss = 1448
**.tcp.sackSupport = true
**.client[*].numApps = 1
**.client[*].app[*].typename  = "TcpGoodputSessionApp"
*.client[*].app[0].tClose = -1s
*.client[*].app[0].sendBytes = 2GB
*.client[*].app[0].dataTransferMode = "bytecount"
*.client[*].app[0].statistic-recording = true

**.server[*].numApps = 1
**.server[*].app[*].typename  = "TcpSinkApp"
**.server[*].app[*].serverThreadModuleType = "tcpgoodputapplications.applications.tcpapp.TcpGoodputSinkAppThread"

**.ppp[*].queue.typename = "BandwidthRecorderDropTailQueue"

**.tcp.initialSsthresh = 5792000

extends = General

**.numberOfFlows = 2

*.client[0].app[0].connectAddress =  "server[" + string(parentIndex()) +"]"
*.client[0].app[0].tOpen = 0.01s
*.client[0].app[0].tSend = 0.01s

*.client[1].app[0].connectAddress =  "server[" + string(parentIndex()) +"]"
*.client[1].app[0].tOpen = 88.6209781860862s
*.client[1].app[0].tSend = 88.6209781860862s

**.ppp[*].queue.packetCapacity = 1553
*.scenarioManager.script = xmldoc("../180ms.xml")
sim-time-limit = 360.0s

network = topologies.AidenDumbbell

[Config CleanSlate]
extends = General
# "Main" flow:
**.client[*].tcp.typename = "CleanSlateTcp"
**.client[*].tcp.tcpAlgorithmClass = "CleanSlate"

# Servers
**.server[*].tcp.typename = "TcpPaced"
**.server[*].tcp.tcpAlgorithmClass = "TcpCubic"

# Orca Parameters
**.rewardDelayForgiveness = 1.25        # How much delay increases should be forgiven/ignored in reward calculation
**.rewardLossMultiplier = 5             # How strongly loss should affect reward calculation
**.printDebugMessages = false           # set to true to print debug messages for the CC algorithm
**.takeActions = true                  # If false, will stop Orca from performing actions
**.maxRLSteps = 999999            # Steps before a given agent's simulation is reset
**.fixedIntervals = true                # Interval lengths should be fixed
**.fixedIntervalDuration = .02          # Monitor interval duration in seconds. Still used as initial intervalDuration if not using fixed intervals.
debug-on-errors = true

[Config Orca]
extends = General

# A single agent uses Orca
**.client[*].tcp.typename = "OrcaTcp"
**.client[*].tcp.tcpAlgorithmClass = "Orca"

# Servers
**.server[*].tcp.typename = "TcpPaced"
**.server[*].tcp.tcpAlgorithmClass = "TcpCubic"

# Orca Parameters
**.printDebugMessages = true           # set to true to print debug messages for the CC algorithm

[Config Cubic]
extends = Orca
**.takeActions = false

[Config Astraea]
extends = General

**.client[*].tcp.typename = "AstraeaTcp"
**.client[*].tcp.tcpAlgorithmClass = "Astraea"

# Servers
**.server[*].tcp.typename = "TcpPaced"
**.server[*].tcp.tcpAlgorithmClass = "TcpCubic"

# Astraea Parameters
**.printDebugMessages = true             # set to true to print debug messages for the CC algorithm
debug-on-errors = true
